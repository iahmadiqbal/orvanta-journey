  <path d="M32 4C17.64 4 6 15.64 6 30s11.64 26 26 26 26-11.64 26-26S46.36 4 32 4zm-4 39l-13-13 3.66-3.66L32 39.68l19.68-19.68L55.34 23.66 28 51z" fill="white" opacity="0.2"/>
